version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crud_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - crud-network

  webserver:
    image: nginx:alpine
    container_name: crud_webserver
    restart: unless-stopped
    ports:
      - "80:80" # mapeia porta 80 do host
    volumes:
      - ./:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - crud-network

networks:
  crud-network:
    driver: bridge
