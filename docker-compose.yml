version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crud_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - crud-network
    depends_on:
      - db

  webserver:
    image: nginx:alpine
    container_name: crud_webserver
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - crud-network

  db:
    image: mysql:8.0
    container_name: crud_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: root
      MYSQL_PASSWORD: ecenture
      MYSQL_ROOT_PASSWORD: ecenture
    ports:
      - "3306:3306"
    networks:
      - crud-network
    volumes:
      - db_data:/var/lib/mysql

networks:
  crud-network:
    driver: bridge

volumes:
  db_data:
